<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">A ladder from robot outcome to defensible training supervision</title>
  <desc id="desc">Four narrowing stages move from episode outcome through failure localization and context matching to a training target, with methods and uncertainty attached to each stage.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1522"/><stop offset="1" stop-color="#1d1730"/></linearGradient><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#c4b5fd"/></marker></defs>
  <rect width="1400" height="780" rx="28" fill="url(#bg)"/>
  <text x="700" y="62" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="700" fill="#fff">A failure is not yet a learning target</text>
  <text x="700" y="100" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" fill="#c9c4d8">Post-training works when the supervision becomes more causal as it becomes more local.</text>
  <g font-family="Inter,Arial,sans-serif">
    <g><rect x="80" y="165" width="290" height="420" rx="24" fill="#2a2138" stroke="#a78bfa" stroke-width="2"/><text x="225" y="212" text-anchor="middle" font-size="17" font-weight="700" fill="#c4b5fd">1 · OUTCOME</text><text x="225" y="257" text-anchor="middle" font-size="23" font-weight="700" fill="#fff">Did the episode work?</text><text x="115" y="309" font-size="16" fill="#e5e1ec">• success / failure</text><text x="115" y="342" font-size="16" fill="#e5e1ec">• time and interventions</text><text x="115" y="375" font-size="16" fill="#e5e1ec">• safety constraint</text><line x1="120" y1="410" x2="330" y2="410" stroke="#655775"/><text x="225" y="453" text-anchor="middle" font-size="15" fill="#fcd34d">Good for evaluation</text><text x="225" y="481" text-anchor="middle" font-size="15" fill="#fcd34d">Weak causal credit</text><text x="225" y="535" text-anchor="middle" font-size="15" fill="#c9c4d8">binary RL · KTO</text></g>
    <g><rect x="405" y="195" width="290" height="390" rx="24" fill="#252b41" stroke="#60a5fa" stroke-width="2"/><text x="550" y="242" text-anchor="middle" font-size="17" font-weight="700" fill="#93c5fd">2 · WINDOW</text><text x="550" y="287" text-anchor="middle" font-size="23" font-weight="700" fill="#fff">Where did it turn?</text><text x="440" y="339" font-size="16" fill="#e5e1ec">• intervention boundary</text><text x="440" y="372" font-size="16" fill="#e5e1ec">• progress reversal</text><text x="440" y="405" font-size="16" fill="#e5e1ec">• contact / planning event</text><line x1="445" y1="440" x2="655" y2="440" stroke="#58647e"/><text x="550" y="482" text-anchor="middle" font-size="15" fill="#fcd34d">Better temporal credit</text><text x="550" y="510" text-anchor="middle" font-size="15" fill="#fcd34d">Cause still ambiguous</text><text x="550" y="557" text-anchor="middle" font-size="15" fill="#c9c4d8">correction SFT · process critic</text></g>
    <g><rect x="730" y="225" width="290" height="360" rx="24" fill="#193542" stroke="#2dd4bf" stroke-width="2"/><text x="875" y="272" text-anchor="middle" font-size="17" font-weight="700" fill="#5eead4">3 · MATCH</text><text x="875" y="317" text-anchor="middle" font-size="23" font-weight="700" fill="#fff">What was the alternative?</text><text x="765" y="369" font-size="16" fill="#e5e1ec">• same state and history</text><text x="765" y="402" font-size="16" fill="#e5e1ec">• rejected vs corrected action</text><text x="765" y="435" font-size="16" fill="#e5e1ec">• likelihood is defined</text><line x1="770" y1="470" x2="980" y2="470" stroke="#3e6970"/><text x="875" y="512" text-anchor="middle" font-size="15" fill="#fcd34d">Defensible preference</text><text x="875" y="557" text-anchor="middle" font-size="15" fill="#c9c4d8">DPO / APO · ranking loss</text></g>
    <g><rect x="1055" y="255" width="270" height="330" rx="24" fill="#173b31" stroke="#4ade80" stroke-width="2"/><text x="1190" y="302" text-anchor="middle" font-size="17" font-weight="700" fill="#86efac">4 · TARGET</text><text x="1190" y="347" text-anchor="middle" font-size="23" font-weight="700" fill="#fff">What should update?</text><text x="1090" y="399" font-size="16" fill="#e5e1ec">• action / chunk</text><text x="1090" y="432" font-size="16" fill="#e5e1ec">• subtask / planner</text><text x="1090" y="465" font-size="16" fill="#e5e1ec">• critic / detector</text><line x1="1095" y1="500" x2="1285" y2="500" stroke="#3d6c59"/><text x="1190" y="542" text-anchor="middle" font-size="15" fill="#fcd34d">Smallest justified update</text></g>
    <g fill="none" stroke="#c4b5fd" stroke-width="4" marker-end="url(#a)"><path d="M375 375H395"/><path d="M700 390H720"/><path d="M1025 405H1045"/></g>
    <rect x="275" y="640" width="850" height="82" rx="18" fill="#111827" stroke="#475569"/><text x="700" y="674" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">Stop when attribution becomes fictional</text><text x="700" y="703" text-anchor="middle" font-size="16" fill="#cbd5e1">A wider label is honest but weak. A precise label is useful only if the logs support it.</text>
  </g>
</svg>
