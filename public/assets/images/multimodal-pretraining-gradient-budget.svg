<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Why sample percentage is not the multimodal gradient budget</title>
  <desc id="desc">Examples from text, images, video, and robot trajectories expand into different numbers of predicted units and consume different compute before their gradients reach shared parameters and capability evaluations.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eaf2ff"/></linearGradient><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#365f91"/></marker></defs>
  <rect width="1400" height="780" rx="28" fill="url(#bg)"/>
  <text x="700" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="33" font-weight="700" fill="#18324e">A data mixture becomes a gradient budget</text>
  <text x="700" y="94" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" fill="#506987">One sampled example can mean 128 text tokens, 1,024 image patches, 16 video frames, or a correlated action chunk.</text>
  <g font-family="Inter,Arial,sans-serif">
    <text x="130" y="148" font-size="17" font-weight="700" fill="#365f91">SAMPLED EXAMPLES</text>
    <text x="525" y="148" font-size="17" font-weight="700" fill="#365f91">PREDICTED UNITS + FLOPs</text>
    <text x="915" y="148" font-size="17" font-weight="700" fill="#365f91">SHARED UPDATE</text>
    <g font-size="18"><rect x="70" y="180" width="260" height="72" rx="16" fill="#dbeafe"/><text x="105" y="225" fill="#1e4e79">text sequence</text><rect x="70" y="270" width="260" height="72" rx="16" fill="#dcfce7"/><text x="105" y="315" fill="#246044">image–text pair</text><rect x="70" y="360" width="260" height="72" rx="16" fill="#fef3c7"/><text x="105" y="405" fill="#73520c">video clip</text><rect x="70" y="450" width="260" height="72" rx="16" fill="#f3e8ff"/><text x="105" y="495" fill="#664080">robot trajectory</text></g>
    <g fill="none" stroke="#365f91" stroke-width="3" marker-end="url(#a)"><path d="M340 216H455"/><path d="M340 306H455"/><path d="M340 396H455"/><path d="M340 486H455"/></g>
    <g font-size="17"><rect x="465" y="180" width="310" height="72" rx="16" fill="#fff" stroke="#93b5d8"/><text x="500" y="210" fill="#18324e">token loss</text><text x="500" y="235" fill="#65798f">short sequence · cheap decode</text><rect x="465" y="270" width="310" height="72" rx="16" fill="#fff" stroke="#93b5d8"/><text x="500" y="300" fill="#18324e">contrastive / token loss</text><text x="500" y="325" fill="#65798f">resolution controls sequence</text><rect x="465" y="360" width="310" height="72" rx="16" fill="#fff" stroke="#93b5d8"/><text x="500" y="390" fill="#18324e">frame / latent loss</text><text x="500" y="415" fill="#65798f">time multiplies visual cost</text><rect x="465" y="450" width="310" height="72" rx="16" fill="#fff" stroke="#93b5d8"/><text x="500" y="480" fill="#18324e">action loss</text><text x="500" y="505" fill="#65798f">steps are temporally correlated</text></g>
    <g fill="none" stroke="#365f91" stroke-width="3" marker-end="url(#a)"><path d="M785 216 900 330"/><path d="M785 306 900 350"/><path d="M785 396 900 370"/><path d="M785 486 900 390"/></g>
    <rect x="910" y="230" width="300" height="300" rx="26" fill="#18324e"/>
    <text x="1060" y="282" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">shared parameters</text>
    <text x="1060" y="326" text-anchor="middle" font-size="17" fill="#d9e7f4">gradient norm</text><text x="1060" y="356" text-anchor="middle" font-size="17" fill="#d9e7f4">gradient direction</text><text x="1060" y="386" text-anchor="middle" font-size="17" fill="#d9e7f4">module update share</text><text x="1060" y="416" text-anchor="middle" font-size="17" fill="#d9e7f4">optimizer state</text><line x1="965" y1="444" x2="1155" y2="444" stroke="#5d7895"/><text x="1060" y="478" text-anchor="middle" font-size="16" fill="#fcd34d">sample share ≠ token share</text><text x="1060" y="504" text-anchor="middle" font-size="16" fill="#fcd34d">token share ≠ update share</text>
    <path d="M1220 380H1300" fill="none" stroke="#365f91" stroke-width="3" marker-end="url(#a)"/>
    <g transform="translate(0 30)"><rect x="930" y="575" width="400" height="120" rx="20" fill="#fff" stroke="#93b5d8"/><text x="1130" y="612" text-anchor="middle" font-size="18" font-weight="700" fill="#18324e">Close the loop with capability residuals</text><text x="1130" y="645" text-anchor="middle" font-size="16" fill="#526b84">text retention · visual grounding · generation</text><text x="1130" y="674" text-anchor="middle" font-size="16" fill="#526b84">temporal prediction · robot success · latency</text></g>
    <path d="M1060 540V600" fill="none" stroke="#365f91" stroke-width="3" marker-end="url(#a)"/>
  </g>
</svg>
