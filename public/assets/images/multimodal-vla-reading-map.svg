<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Reading map from vision-language pretraining to a deployed robot policy</title>
  <desc id="desc">Four linked stages show how semantic visual representations, robot demonstrations, action interfaces, and closed-loop feedback build on one another. Each stage names the question a reader should carry into the literature.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#09131f"/><stop offset="1" stop-color="#15263b"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="1400" height="760" rx="30" fill="url(#bg)"/>
  <text x="700" y="64" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="700" fill="#f8fafc">A robot policy inherits four different kinds of structure</text>
  <text x="700" y="102" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" fill="#b9c8d8">Read the field as a chain of contracts, not a parade of model names.</text>
  <g fill="none" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)">
    <path d="M335 306H395"/><path d="M665 306H725"/><path d="M995 306H1055"/>
  </g>
  <g font-family="Inter,Arial,sans-serif" filter="url(#shadow)">
    <g><rect x="65" y="165" width="270" height="282" rx="22" fill="#152f46" stroke="#38bdf8" stroke-width="2"/><text x="200" y="212" text-anchor="middle" font-size="17" font-weight="700" fill="#7dd3fc">PART I · VLM</text><text x="200" y="254" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">Semantic vision</text><text x="200" y="290" text-anchor="middle" font-size="16" fill="#d6e6f3">images ↔ language</text><text x="200" y="325" text-anchor="middle" font-size="16" fill="#d6e6f3">grounding · time · geometry</text><line x1="105" y1="348" x2="295" y2="348" stroke="#45647d"/><text x="200" y="383" text-anchor="middle" font-size="15" fill="#fef3c7">What evidence survives</text><text x="200" y="407" text-anchor="middle" font-size="15" fill="#fef3c7">the visual interface?</text></g>
    <g><rect x="395" y="165" width="270" height="282" rx="22" fill="#173b36" stroke="#34d399" stroke-width="2"/><text x="530" y="212" text-anchor="middle" font-size="17" font-weight="700" fill="#6ee7b7">PART II · DATA</text><text x="530" y="254" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">Robot experience</text><text x="530" y="290" text-anchor="middle" font-size="16" fill="#d8f3ea">tasks · scenes · embodiments</text><text x="530" y="325" text-anchor="middle" font-size="16" fill="#d8f3ea">successes · recoveries</text><line x1="435" y1="348" x2="625" y2="348" stroke="#49736c"/><text x="530" y="383" text-anchor="middle" font-size="15" fill="#fef3c7">Which variation teaches</text><text x="530" y="407" text-anchor="middle" font-size="15" fill="#fef3c7">transfer rather than noise?</text></g>
    <g><rect x="725" y="165" width="270" height="282" rx="22" fill="#40351d" stroke="#fbbf24" stroke-width="2"/><text x="860" y="212" text-anchor="middle" font-size="17" font-weight="700" fill="#fcd34d">PART II · POLICY</text><text x="860" y="254" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">Action distribution</text><text x="860" y="290" text-anchor="middle" font-size="16" fill="#f8edcc">tokens · chunks · diffusion</text><text x="860" y="325" text-anchor="middle" font-size="16" fill="#f8edcc">flow · control rate</text><line x1="765" y1="348" x2="955" y2="348" stroke="#75643a"/><text x="860" y="383" text-anchor="middle" font-size="15" fill="#fef3c7">What behavior can the</text><text x="860" y="407" text-anchor="middle" font-size="15" fill="#fef3c7">model express on time?</text></g>
    <g><rect x="1055" y="165" width="270" height="282" rx="22" fill="#3c263e" stroke="#e879f9" stroke-width="2"/><text x="1190" y="212" text-anchor="middle" font-size="17" font-weight="700" fill="#f0abfc">PART III · LOOP</text><text x="1190" y="254" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">Closed-loop evidence</text><text x="1190" y="290" text-anchor="middle" font-size="16" fill="#f1dcf4">failures · feedback · critics</text><text x="1190" y="325" text-anchor="middle" font-size="16" fill="#f1dcf4">RL · evaluation · rollback</text><line x1="1095" y1="348" x2="1285" y2="348" stroke="#714b74"/><text x="1190" y="383" text-anchor="middle" font-size="15" fill="#fef3c7">Which observation justifies</text><text x="1190" y="407" text-anchor="middle" font-size="15" fill="#fef3c7">the next policy update?</text></g>
  </g>
  <path d="M1190 485C1190 610 1045 650 700 650S200 610 200 485" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="9 9" marker-end="url(#arrow)"/>
  <text x="700" y="584" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">Deployment changes the next dataset</text>
  <text x="700" y="616" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" fill="#aebed0">The chain becomes a learning system only when failures flow back into representation, data, and action choices.</text>
</svg>
