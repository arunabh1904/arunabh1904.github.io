<svg xmlns="http://www.w3.org/2000/svg" width="960" height="340" viewBox="0 0 960 340" role="img" aria-labelledby="title desc">
  <title id="title">PPO clipped objective schematic</title>
  <desc id="desc">A diagram showing the PPO probability ratio clipped between one minus epsilon and one plus epsilon to limit policy update incentives.</desc>
  <rect width="960" height="340" rx="24" fill="#10120f"/>
  <line x1="118" y1="236" x2="836" y2="236" stroke="#f4df6a" stroke-width="2"/>
  <line x1="160" y1="78" x2="160" y2="260" stroke="#f4df6a" stroke-width="2"/>
  <path d="M164 220 C280 198 338 146 420 130 C510 114 602 124 786 116" fill="none" stroke="#fff2a8" stroke-width="4"/>
  <path d="M164 220 C280 198 338 146 420 130 C510 114 602 124 786 116" fill="none" stroke="#fff2a8" stroke-width="4" stroke-dasharray="1 14" stroke-linecap="round"/>
  <line x1="356" y1="82" x2="356" y2="260" stroke="#d4b4ff" stroke-width="3" stroke-dasharray="8 8"/>
  <line x1="604" y1="82" x2="604" y2="260" stroke="#d4b4ff" stroke-width="3" stroke-dasharray="8 8"/>
  <g fill="#fff2a8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="112" y="286" font-size="18">ratio r</text>
    <text x="326" y="286" font-size="18">1-eps</text>
    <text x="578" y="286" font-size="18">1+eps</text>
    <text x="268" y="58" font-size="19">clip region keeps update incentives bounded</text>
    <text x="706" y="108" font-size="18">unclipped push</text>
  </g>
  <text x="58" y="44" fill="#c9c08a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">PPO's practical trick is refusing to reward policy ratios that move too far from the old policy.</text>
</svg>
